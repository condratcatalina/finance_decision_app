<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight - Autentificare</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-indigo-50 h-screen flex items-center justify-center p-4">

    <div id="auth-container" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-900">Fin<span class="text-indigo-400">Sight</span></h1>
            <p class="text-gray-500 mt-2" id="auth-title">Autentifică-te pentru a continua</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="login-email" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Parolă</label>
                <input type="password" id="login-password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Conectare</button>

            <div id="google-separator" class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase font-semibold">sau</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div id="google-btn-container" class="w-full flex justify-center">
                <div id="googleBtn" class="w-full"></div>
            </div>

            <p class="text-center text-sm text-gray-600 mt-4">
                Nu ai cont? <a href="#" onclick="toggleAuth()" class="text-indigo-600 font-bold">Înregistrează-te</a>
            </p>
        </form>

        <form id="register-form" class="space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2 border-b pb-2 mb-2">
                    <h3 class="text-sm font-bold text-gray-400 uppercase">Informații Cont</h3>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Nume Utilizator</label>
                    <input type="text" id="reg-username" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Email</label>
                    <input type="email" id="reg-email" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-700">Parolă</label>
                    <input type="password" id="reg-password" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div class="md:col-span-2 border-b pb-2 mt-4 mb-2">
                    <h3 class="text-sm font-bold text-gray-400 uppercase">Detalii pentru Analiza Credit</h3>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Vârstă</label>
                    <input type="number" id="reg-varsta" value="30" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Gen</label>
                    <select id="reg-gen" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="0">Masculin</option>
                        <option value="1">Feminin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Educație</label>
                    <select id="reg-educatie" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="1">Liceu</option>
                        <option value="2" selected>Licență</option>
                        <option value="3">Master</option>
                        <option value="4">Doctorat</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Vechime muncă (ani)</label>
                    <input type="number" id="reg-vechime" value="5" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Tip Locuință</label>
                    <select id="reg-locuinta" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="0">Chirie</option>
                        <option value="1" selected>Proprietar</option>
                        <option value="2">Altele</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700">Vechime istoric credit (ani)</label>
                    <input type="number" id="reg-istoric-ani" value="3" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-700">Incidente de neplată în trecut?</label>
                    <select id="reg-neplata" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="0">Nu</option>
                        <option value="1">Da</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition shadow-lg shadow-green-100">Creează Cont FinSight</button>
            <p class="text-center text-sm text-gray-600 mt-4">
                Ai deja cont? <a href="#" onclick="toggleAuth()" class="text-indigo-600 font-bold">Conectează-te</a>
            </p>
        </form>
    </div>

    <script>
        const API_URL = window.location.origin;

        // INIȚIALIZARE SDK GOOGLE OAUTH
        window.onload = function () {
            google.accounts.id.initialize({
                // ÎNLOCUIEȘTE textul de mai jos cu codul tău Client ID obținut din Google Cloud
                client_id: "726233842111-lb660egqoidifi85encp4e1dk4baqn2e.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", width: "384", text: "continue_with" }
            );
        }

        // Interceptarea token-ului generat securizat de către Google
        async function handleCredentialResponse(response) {
            try {
                const res = await fetch(`${API_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: response.credential })
                });

                const data = await res.json();
                if (res.ok) {
                    sessionStorage.setItem('token', data.token);
                    window.location.href = "/";
                } else {
                    alert("Eroare autentificare Google: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Eroare de comunicare cu serverul dedicat Google.");
            }
        }

        function toggleAuth() {
            const container = document.getElementById('auth-container');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const title = document.getElementById('auth-title');

            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');

            const isRegister = loginForm.classList.contains('hidden');

            if (isRegister) {
                container.classList.replace('max-w-md', 'max-w-2xl');
                title.innerText = "Completează datele pentru profilul tău financiar";
            } else {
                container.classList.replace('max-w-2xl', 'max-w-md');
                title.innerText = "Autentifică-te pentru a continua";
            }
        }

        // LOGICĂ LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    sessionStorage.setItem('token', data.token);
                    window.location.href = "/";
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Eroare de conexiune la server.");
            }
        });

        // LOGICĂ REGISTER
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                varsta: parseInt(document.getElementById('reg-varsta').value),
                gen: parseInt(document.getElementById('reg-gen').value),
                educatie: parseInt(document.getElementById('reg-educatie').value),
                vechime: parseInt(document.getElementById('reg-vechime').value),
                tip_locuinta: parseInt(document.getElementById('reg-locuinta').value),
                ani_istoric_credit: parseInt(document.getElementById('reg-istoric-ani').value),
                istoric_neplata: parseInt(document.getElementById('reg-neplata').value)
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Cont creat cu succes! Acum te poți conecta.");
                    toggleAuth();
                } else {
                    const data = await response.json();
                    alert("Eroare: " + data.error);
                }
            } catch (err) {
                alert("Eroare la trimiterea datelor.");
            }
        });
    </script>
</body>
</html>
